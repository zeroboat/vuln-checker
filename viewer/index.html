<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>취약점 점검 결과 뷰어</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<style>
:root {
  --bg:#f5f7fa; --surface:#ffffff; --text:#1a1a2e; --text-secondary:#6b7280;
  --border:#e5e7eb; --pass:#10b981; --fail:#ef4444; --review:#f59e0b;
  --pass-bg:#ecfdf5; --fail-bg:#fef2f2; --review-bg:#fffbeb;
  --primary:#3b82f6; --primary-hover:#2563eb;
  --worse-bg:#fff1f2; --better-bg:#f0fdf4;
  --shadow:rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg:#0f172a; --surface:#1e293b; --text:#e2e8f0; --text-secondary:#94a3b8;
  --border:#334155; --pass-bg:#064e3b; --fail-bg:#450a0a; --review-bg:#451a03;
  --worse-bg:#450a0a; --better-bg:#064e3b;
  --shadow:rgba(0,0,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;min-height:100vh;}
.container{max-width:1200px;margin:0 auto;padding:20px;}

/* ── Header ─────────────────────────────────────────── */
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin-bottom:24px;border-bottom:1px solid var(--border);}
.header h1{font-size:1.5rem;}
.header-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.header-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;color:var(--text);font-size:14px;white-space:nowrap;transition:all .15s;}
.header-btn:hover{border-color:var(--primary);color:var(--primary);}

/* ── Upload ─────────────────────────────────────────── */
.upload-zone{border:2px dashed var(--border);border-radius:16px;padding:60px 20px;text-align:center;background:var(--surface);cursor:pointer;transition:border-color .2s;margin-bottom:24px;}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);}
.upload-zone h2{margin-bottom:8px;font-size:1.2rem;}
.upload-zone p{color:var(--text-secondary);font-size:14px;}
.upload-zone input{display:none;}
.sample-zone{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:-12px 0 24px;}
.sample-zone span{color:var(--text-secondary);font-size:14px;}
.sample-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;color:var(--text);font-size:14px;transition:all .15s;}
.sample-btn:hover{border-color:var(--primary);color:var(--primary);}
.sample-btn.enc{border-style:dashed;}
.pass-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;}
.pass-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:min(92vw,400px);box-shadow:0 20px 60px rgba(0,0,0,.45);}
.pass-card h3{margin:0 0 10px;font-size:18px;}
.pass-card #passHint{color:var(--text-secondary);font-size:14px;margin:0 0 16px;line-height:1.55;}
.pass-card #passHint code{background:var(--border);padding:2px 6px;border-radius:5px;font-size:13px;}
.pass-card input{width:100%;box-sizing:border-box;padding:11px 13px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);font-size:15px;}
.pass-card input:focus{outline:none;border-color:var(--primary);}
.pass-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.pass-actions button{padding:9px 18px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:14px;}
.pass-ok{background:var(--primary);color:#fff;border-color:var(--primary);}
.pass-cancel{background:transparent;color:var(--text);}

/* ── Compare Banner ─────────────────────────────────── */
.compare-banner{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;flex-wrap:wrap;gap:12px;}
.compare-banner .label{font-size:13px;color:var(--text-secondary);}
.compare-banner .stats{display:flex;gap:16px;flex:1;flex-wrap:wrap;}
.compare-stat{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;}
.compare-stat.worse{color:var(--fail);}
.compare-stat.better{color:var(--pass);}
.compare-stat.same{color:var(--text-secondary);}
.compare-end-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:13px;color:var(--text-secondary);}
.compare-end-btn:hover{border-color:var(--fail);color:var(--fail);}

/* ── Compare upload modal ────────────────────────────── */
.compare-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;}
.compare-box{background:var(--surface);border-radius:16px;padding:32px;max-width:440px;width:90%;text-align:center;}
.compare-box h3{margin-bottom:8px;}
.compare-box p{color:var(--text-secondary);font-size:13px;margin-bottom:20px;}
.compare-drop{border:2px dashed var(--border);border-radius:12px;padding:32px 16px;cursor:pointer;transition:border-color .2s;margin-bottom:16px;}
.compare-drop:hover,.compare-drop.dragover{border-color:var(--primary);}
.compare-drop p{color:var(--text-secondary);font-size:14px;}
.compare-drop input{display:none;}
.compare-cancel{background:none;border:1px solid var(--border);border-radius:8px;padding:8px 20px;cursor:pointer;color:var(--text-secondary);font-size:13px;}

/* ── Dashboard ──────────────────────────────────────── */
.dashboard{display:none;}
.dashboard.active{display:block;}

/* ── Hero ───────────────────────────────────────────── */
.hero{background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:0 1px 3px var(--shadow);margin-bottom:20px;overflow:hidden;}
.hero-top{display:grid;grid-template-columns:180px 1fr;gap:0;}
.hero-score-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;border-right:1px solid var(--border);gap:8px;}
.score-ring{position:relative;width:110px;height:110px;}
.score-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.score-bg{fill:none;stroke:var(--border);stroke-width:10;}
.score-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s ease,stroke .3s;}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.score-num .num{font-size:2rem;font-weight:800;line-height:1;}
.score-num .denom{font-size:11px;color:var(--text-secondary);}
.score-label{font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:.02em;}
.score-delta{font-size:13px;font-weight:700;margin-top:2px;}
.score-delta.up{color:var(--pass);}
.score-delta.down{color:var(--fail);}
.hero-fails-col{padding:20px 24px;min-width:0;}
.hero-fails-title{font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fail-count-badge{background:var(--fail-bg);color:var(--fail);font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px;}

/* Fail cards */
.fail-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
.fail-card{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--fail);border-radius:10px;padding:12px 14px;}
.fail-card.high-sev{border-left-color:#b91c1c;}
.fail-card.card-worse{border-left-color:#f97316;background:var(--worse-bg);}
.fail-card-header{display:flex;align-items:flex-start;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.fail-card-code{font-size:11px;font-weight:700;color:var(--fail);background:var(--fail-bg);padding:2px 7px;border-radius:6px;white-space:nowrap;margin-top:1px;}
.fail-card.high-sev .fail-card-code{color:#b91c1c;background:#fee2e2;}
.high-badge{font-size:10px;font-weight:700;color:#b91c1c;background:#fee2e2;padding:1px 5px;border-radius:4px;white-space:nowrap;margin-top:2px;}
.diff-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;white-space:nowrap;margin-top:2px;}
.diff-badge.worse{background:var(--fail-bg);color:#b91c1c;}
.diff-badge.new{background:#ede9fe;color:#5b21b6;}
.fail-card-name{font-size:13px;font-weight:600;line-height:1.4;flex:1;min-width:120px;}
.fail-card-body{display:flex;align-items:flex-start;gap:8px;}
.fail-card-body code{font-family:'Consolas','Courier New',monospace;font-size:11.5px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;flex:1;line-height:1.5;white-space:pre-wrap;word-break:break-all;color:var(--text);}
.fail-card-body .no-remedy{font-size:12px;color:var(--text-secondary);flex:1;padding:6px 0;font-style:italic;}
.copy-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;color:var(--text-secondary);white-space:nowrap;flex-shrink:0;transition:all .15s;}
.copy-btn:hover{border-color:var(--primary);color:var(--primary);}
.copy-btn.copied{border-color:var(--pass);color:var(--pass);}

/* Fixed items section */
.fixed-section{padding:12px 24px;border-top:1px solid var(--border);background:var(--better-bg);}
.fixed-section-title{font-size:12px;font-weight:600;color:var(--pass);margin-bottom:8px;}
.fixed-list{display:flex;flex-wrap:wrap;gap:8px;}
.fixed-item{background:var(--surface);border:1px solid var(--pass);border-radius:8px;padding:5px 12px;font-size:12px;display:flex;gap:6px;align-items:center;}
.fixed-item .fixed-code{color:var(--pass);font-weight:700;}

/* All-pass hero */
.hero-all-pass{display:grid;grid-template-columns:180px 1fr;border:none;}
.hero-all-pass .score-side{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;border-right:1px solid var(--border);gap:8px;}
.hero-all-pass .msg-side{display:flex;align-items:center;gap:20px;padding:24px;}
.hero-all-pass .apass-icon{font-size:2.5rem;}
.hero-all-pass .apass-msg{font-size:1.1rem;font-weight:600;color:var(--pass);}
.hero-all-pass .apass-sub{font-size:13px;color:var(--text-secondary);margin-top:4px;}

/* Hero expand */
.hero-more{text-align:center;padding:8px 0 6px;border-top:1px solid var(--border);}
.hero-more button{background:none;border:none;color:var(--primary);font-size:13px;cursor:pointer;padding:4px 16px;}
.hero-more button:hover{text-decoration:underline;}

/* ── Info card ──────────────────────────────────────── */
.info-card{background:var(--surface);border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid var(--border);box-shadow:0 1px 3px var(--shadow);}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.info-item{font-size:14px;}
.info-item .label{color:var(--text-secondary);font-size:12px;margin-bottom:2px;}

/* ── Stats ──────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border);box-shadow:0 1px 3px var(--shadow);}
.stat-card .number{font-size:2rem;font-weight:700;}
.stat-card .label{font-size:13px;color:var(--text-secondary);margin-top:4px;}
.stat-card .delta{font-size:12px;margin-top:4px;font-weight:600;}
.stat-card.pass .number{color:var(--pass);}
.stat-card.fail .number{color:var(--fail);}
.stat-card.review .number{color:var(--review);}

/* ── Chart ──────────────────────────────────────────── */
.chart-section{display:grid;grid-template-columns:300px 1fr;gap:20px;margin-bottom:20px;}
.chart-box{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
.chart-box canvas{max-width:250px;max-height:250px;}

/* ── Toolbar ────────────────────────────────────────── */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.toolbar-left{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.toolbar-right{display:flex;gap:8px;align-items:center;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;transition:all .2s;}
.filter-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;}
.search-input{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;width:200px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--primary);}
.btn-pdf{padding:8px 20px;border-radius:8px;border:none;background:var(--primary);color:white;cursor:pointer;font-size:14px;}
.btn-pdf:hover{background:var(--primary-hover);}
.btn-reset{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;}

/* ── Checks list ────────────────────────────────────── */
.count-badge{font-size:12px;color:var(--text-secondary);margin-bottom:8px;}
.checks-list{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.check-item{border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.check-item:last-child{border-bottom:none;}
.check-item:hover{background:var(--bg);}
.check-item.diff-worse{border-left:3px solid var(--fail);}
.check-item.diff-better{border-left:3px solid var(--pass);}
.check-header{display:flex;align-items:center;padding:14px 20px;gap:10px;flex-wrap:wrap;}
.check-code{font-weight:600;font-size:14px;min-width:50px;}
.check-name{flex:1;font-size:14px;min-width:120px;}
.check-category-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--text-secondary);white-space:nowrap;}
.check-standard-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--primary);color:#fff;white-space:nowrap;}
.status-badge{padding:4px 10px;border-radius:12px;font-size:12px;font-weight:600;white-space:nowrap;}
.status-badge.PASS{background:var(--pass-bg);color:var(--pass);}
.status-badge.FAIL{background:var(--fail-bg);color:var(--fail);}
.status-badge.REVIEW{background:var(--review-bg);color:var(--review);}
.inline-diff-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;}
.inline-diff-badge.worse{background:var(--fail-bg);color:#b91c1c;}
.inline-diff-badge.better{background:var(--pass-bg);color:#065f46;}
.inline-diff-badge.new{background:#ede9fe;color:#5b21b6;}
.chevron{font-size:12px;color:var(--text-secondary);transition:transform .2s;flex-shrink:0;}
.check-item.open .chevron{transform:rotate(90deg);}
.check-detail{display:none;padding:0 20px 16px;}
.check-item.open .check-detail{display:block;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.detail-block{background:var(--bg);border-radius:8px;padding:12px;}
.detail-block h4{font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
.detail-block p{font-size:13px;line-height:1.5;}
.detail-result{grid-column:1/-1;background:var(--bg);border-radius:8px;padding:12px;}
.detail-result h4{font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
.detail-remedy{grid-column:1/-1;background:var(--fail-bg);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:12px;}
.detail-remedy h4{font-size:12px;color:var(--fail);margin-bottom:8px;}
.detail-remedy .remedy-row{display:flex;gap:8px;align-items:flex-start;}
.detail-remedy code{font-family:'Consolas','Courier New',monospace;font-size:12px;line-height:1.5;white-space:pre-wrap;color:var(--text);}
.detail-compare{grid-column:1/-1;background:var(--review-bg);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:12px;}
.detail-compare h4{font-size:12px;color:var(--review);margin-bottom:4px;}
.detail-compare p{font-size:13px;}

/* ── N/A 마킹 ───────────────────────────────────────── */
.na-btn{background:none;border:1px solid var(--border);border-radius:12px;padding:3px 10px;cursor:pointer;font-size:11px;color:var(--text-secondary);white-space:nowrap;transition:all .15s;flex-shrink:0;}
.na-btn:hover{border-color:#9ca3af;color:#6b7280;}
.na-btn.is-na{background:#f3f4f6;border-color:#9ca3af;color:#374151;font-weight:600;}
[data-theme="dark"] .na-btn.is-na{background:#374151;border-color:#6b7280;color:#d1d5db;}
.check-item.na-item{opacity:.6;}
.check-item.na-item .check-name{text-decoration:line-through;text-decoration-color:#9ca3af;color:var(--text-secondary);}
.check-item.na-item .check-code{color:var(--text-secondary);}
.status-badge.NA{background:#f3f4f6;color:#6b7280;}
[data-theme="dark"] .status-badge.NA{background:#374151;color:#9ca3af;}

/* ── Toast ──────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;pointer-events:none;transition:transform .3s ease;z-index:9999;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2);}
.toast.show{transform:translateX(-50%) translateY(0);}
[data-theme="dark"] .toast{background:#e2e8f0;color:#0f172a;}

/* ── Responsive ─────────────────────────────────────── */
@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .chart-section{grid-template-columns:1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .hero-top{grid-template-columns:1fr;}
  .hero-all-pass{grid-template-columns:1fr;}
  .hero-score-col{flex-direction:row;border-right:none;border-bottom:1px solid var(--border);justify-content:flex-start;gap:20px;}
  .hero-all-pass .score-side{flex-direction:row;border-right:none;border-bottom:1px solid var(--border);justify-content:flex-start;gap:20px;}
  .search-input{width:140px;}
}
@media print{
  .header-btns,.toolbar-right,.upload-zone,.compare-banner{display:none!important;}
  .hero-more{display:none!important;}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- 비교 분석 파일 업로드 모달 -->
<div class="compare-overlay" id="compareModal" style="display:none" onclick="if(event.target===this)closeCompareModal()">
  <div class="compare-box">
    <h3>📊 비교 분석 — 이전 결과 로드</h3>
    <p>이전 점검 결과 JSON 파일을 선택하세요.<br>현재 결과와의 차이를 분석합니다.</p>
    <div class="compare-drop" id="compareDropZone">
      <p>파일을 드래그하거나 클릭하여 선택</p>
      <input type="file" id="compareFileInput" accept=".json">
    </div>
    <button class="compare-cancel" onclick="closeCompareModal()">취소</button>
  </div>
</div>

<!-- 복호화 암호 입력 모달 -->
<div class="pass-modal" id="passModal" style="display:none">
  <div class="pass-card">
    <h3>🔒 암호화된 결과</h3>
    <p id="passHint">이 파일을 보려면 암호를 입력하세요.</p>
    <input type="password" id="passInput" placeholder="암호 입력" autocomplete="off"
      onkeydown="if(event.key==='Enter')submitPass()">
    <div class="pass-actions">
      <button class="pass-cancel" onclick="cancelPass()">취소</button>
      <button class="pass-ok" onclick="submitPass()">복호화</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="header">
    <h1>🛡️ 취약점 점검 결과</h1>
    <div class="header-btns">
      <button class="header-btn" id="backBtn" onclick="resetFile()" style="display:none">← 뒤로</button>
      <button class="header-btn" id="shareLinkBtn" onclick="generateShareLink()" style="display:none">🔗 링크 공유</button>
      <button class="header-btn" id="compareBtn" onclick="openCompareModal()" style="display:none">📊 비교 분석</button>
      <button class="header-btn" id="themeBtn" onclick="toggleTheme()">🌙 다크모드</button>
    </div>
  </div>

  <div class="upload-zone" id="uploadZone">
    <h2>JSON 결과 파일 업로드</h2>
    <p>파일을 드래그하거나 클릭하여 선택하세요</p>
    <input type="file" id="fileInput" accept=".json,.enc">
  </div>

  <div class="sample-zone" id="sampleZone">
    <span>처음이신가요? 예시 결과로 둘러보세요 →</span>
    <button class="sample-btn" onclick="loadSample('kisa')">📋 주기반 점검 (U-01~U-72)</button>
    <button class="sample-btn" onclick="loadSample('cis')">🐧 CIS Linux (CL-01~CL-44)</button>
    <button class="sample-btn" onclick="loadSample('all')">🔀 통합 (전체 기준)</button>
    <button class="sample-btn enc" onclick="loadEncDemo()">🔓 암호화 결과 복호화 데모</button>
  </div>

  <div class="dashboard" id="dashboard">

    <!-- 비교 배너 (비교 모드일 때만 표시) -->
    <div class="compare-banner" id="compareBanner" style="display:none"></div>

    <!-- HERO: Fix-First 액션보드 -->
    <div class="hero" id="heroSection"></div>

    <!-- 서버 정보 -->
    <div class="info-card" id="serverInfo"></div>

    <!-- 통계 카드 -->
    <div class="stats-row" id="statsRow"></div>

    <!-- 차트 + 카테고리 -->
    <div class="chart-section">
      <div class="chart-box"><canvas id="chart"></canvas></div>
      <div class="info-card" id="categoryStats"></div>
    </div>

    <!-- 필터 + 검색 -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div id="filters"></div>
        <input class="search-input" id="searchInput" type="text"
          placeholder="🔍 코드·항목명 검색" oninput="renderChecks()">
      </div>
      <div class="toolbar-right">
        <button class="btn-reset" onclick="resetFile()">다른 파일 열기</button>
        <button class="btn-pdf" onclick="exportPDF()">📄 PDF 내보내기</button>
      </div>
    </div>

    <div id="reportContent">
      <div class="count-badge" id="countBadge"></div>
      <div class="checks-list" id="checksList"></div>
    </div>
  </div>
</div>

<script>
'use strict';
let data = null;
let baseData = null;
let compareMode = false;
let chartInstance = null;
let activeStatusFilter = 'ALL';
let activeCategoryFilter = 'ALL';
let activeStandardFilter = 'ALL';
let heroExpanded = false;
let naSet = new Set();

const statusLabels = { PASS:'양호', FAIL:'취약', REVIEW:'확인필요' };

/* ── KISA "상" 등급 중요 항목 ────────────────────────── */
const HIGH_SEV = new Set([
  'U-01','U-02','U-03','U-04','U-05',    // root SSH, 비밀번호, 잠금, 파일보호, UID0
  'U-36','U-52','U-60',                   // r계열서비스, telnet, SSH암호정책
  'W-01','W-02','W-04','W-05','W-06',    // admin 계정관리, 게스트, 잠금, 복호화, admin그룹
  'W-35','W-40','W-42','W-47',           // SAM, autologon, 익명열거
  'W-48','W-49','W-53','W-65',           // 패스워드 복잡성·길이, telnet
]);

/* ── N/A localStorage ─────────────────────────────────── */
function getNaKey() {
  return 'vuln-checker-na-' + (data?.metadata?.hostname || 'unknown');
}
function loadNaSet() {
  try {
    const saved = localStorage.getItem(getNaKey());
    naSet = saved ? new Set(JSON.parse(saved)) : new Set();
  } catch { naSet = new Set(); }
}
function saveNaSet() {
  try { localStorage.setItem(getNaKey(), JSON.stringify([...naSet])); } catch {}
}
function toggleNA(event, code) {
  event.stopPropagation();
  if (naSet.has(code)) naSet.delete(code);
  else naSet.add(code);
  saveNaSet();
  renderHero();
  renderStats();
  renderChart();
  renderCategoryStats();
  renderFilters();
  renderChecks();
}

/* ── 유틸 ──────────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function copyText(event, elemId, btn) {
  event.stopPropagation();
  const text = document.getElementById(elemId)?.textContent ?? '';
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    showToast('클립보드에 복사됐습니다');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  }).catch(() => showToast('복사 실패 — 수동으로 선택해 주세요'));
}

/* ── 카테고리 (JSON에서 동적 추출) ─────────────────────── */
function getDerivedCategories(src) {
  const seen = new Set();
  (src || data).checks.forEach(c => { if (c.category) seen.add(c.category); });
  return [...seen];
}

/* ── 점검 기준(standard) 동적 추출 — 통합 JSON일 때만 존재 ── */
function getDerivedStandards(src) {
  const seen = new Set();
  (src || data).checks.forEach(c => { if (c.standard) seen.add(c.standard); });
  return [...seen];
}

/* ── 위험도 점수
   FAIL 중요: -4점  FAIL 일반: -2점
   REVIEW 중요: -2점  REVIEW 일반: -1점     */
function calcScore(src) {
  src = src || data;
  const isCurrent = src === data;
  const deduct = src.checks.reduce((acc, c) => {
    if (isCurrent && naSet.has(c.code)) return acc;
    const hi = HIGH_SEV.has(c.code);
    if (c.status === 'FAIL')   return acc + (hi ? 4 : 2);
    if (c.status === 'REVIEW') return acc + (hi ? 2 : 1);
    return acc;
  }, 0);
  return Math.max(0, 100 - deduct);
}

function scoreColor(score) {
  if (score >= 90) return '#10b981';
  if (score >= 70) return '#84cc16';
  if (score >= 50) return '#f59e0b';
  return '#ef4444';
}

/* ── 비교 diff 계산 ──────────────────────────────────────
   WORSE: 이전 미취약 → 지금 취약 (악화)
   BETTER: 이전 취약 → 지금 비취약 (개선)
   NEW: 기준 파일에 없는 항목
   SAME: 변동 없음                               */
function computeDiff() {
  if (!baseData) return {};
  const baseMap = {};
  baseData.checks.forEach(c => { baseMap[c.code] = c.status; });
  const diffMap = {};
  data.checks.forEach(c => {
    const prev = baseMap[c.code];
    if (prev === undefined)                        diffMap[c.code] = 'NEW';
    else if (c.status === 'FAIL' && prev !== 'FAIL') diffMap[c.code] = 'WORSE';
    else if (c.status !== 'FAIL' && prev === 'FAIL') diffMap[c.code] = 'BETTER';
    else                                            diffMap[c.code] = 'SAME';
  });
  return diffMap;
}

/* ── 테마 ──────────────────────────────────────────────── */
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙 다크모드' : '☀️ 라이트모드';
  if (chartInstance) renderChart();
}

/* ── 메인 파일 업로드 ─────────────────────────────────── */
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) loadFile(e.target.files[0]); });

function resetFilters() {
  activeStatusFilter = 'ALL'; activeCategoryFilter = 'ALL'; activeStandardFilter = 'ALL';
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const isEnc = /\.enc$/i.test(file.name) || text.trimStart().startsWith('U2FsdGVkX1');
    if (isEnc) { loadEncryptedText(text, '🔒 암호화된 결과입니다. 암호를 입력하세요.'); return; }
    try { data = JSON.parse(text); resetFilters(); render(); }
    catch { alert('유효한 JSON 파일이 아닙니다.'); }
  };
  reader.readAsText(file);
}

/* ── 암호화 결과 복호화 (openssl AES-256-CBC + PBKDF2 봉투) ─────────── */
async function decryptOpenSSL(b64, password) {
  const clean = (b64 || '').replace(/\s+/g, '');
  const raw = Uint8Array.from(atob(clean), c => c.charCodeAt(0));
  if (raw.length < 16 || String.fromCharCode(...raw.slice(0, 8)) !== 'Salted__')
    throw new Error('형식 오류');
  const salt = raw.slice(8, 16);
  const ct   = raw.slice(16);
  const baseKey = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' }, baseKey, 384);
  const kiv = new Uint8Array(bits);
  const key = await crypto.subtle.importKey(
    'raw', kiv.slice(0, 32), { name: 'AES-CBC' }, false, ['decrypt']);
  const ptBuf = await crypto.subtle.decrypt(
    { name: 'AES-CBC', iv: kiv.slice(32, 48) }, key, ct);
  return new TextDecoder().decode(ptBuf);
}

let _passResolver = null;
function promptPassphrase(hintHtml, isErr) {
  return new Promise(resolve => {
    _passResolver = resolve;
    const h = document.getElementById('passHint');
    h.innerHTML = hintHtml;
    h.style.color = isErr ? '#e5484d' : '';
    const input = document.getElementById('passInput');
    input.value = '';
    document.getElementById('passModal').style.display = 'flex';
    setTimeout(() => input.focus(), 50);
  });
}
function submitPass() {
  if (_passResolver) { const r = _passResolver; _passResolver = null; r(document.getElementById('passInput').value); }
}
function cancelPass() {
  closePass();
  if (_passResolver) { const r = _passResolver; _passResolver = null; r(null); }
}
function closePass() { document.getElementById('passModal').style.display = 'none'; }

async function loadEncryptedText(b64Text, hintHtml) {
  let hint = hintHtml || '🔒 암호화된 결과입니다. 암호를 입력하세요.';
  let isErr = false;
  while (true) {
    const pass = await promptPassphrase(hint, isErr);
    if (pass === null) return;            // 취소
    try {
      const json = JSON.parse(await decryptOpenSSL(b64Text, pass));
      closePass();
      data = json; baseData = null; compareMode = false; resetFilters(); render();
      showToast('🔓 복호화 완료 — 결과를 표시합니다');
      return;
    } catch {
      hint = '❌ 암호가 올바르지 않습니다. 다시 입력하세요.';
      isErr = true;
    }
  }
}

const SAMPLE_ENC = 'samples/sample_all.enc';
function loadEncDemo() {
  fetch(SAMPLE_ENC)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(text => loadEncryptedText(text,
      '🔒 <b>복호화 데모</b><br>데모 암호 <code>demo1234</code> 를 입력해 보세요.'))
    .catch(() => alert('암호화 샘플을 불러오지 못했습니다.\nfile://에서는 차단됩니다. 로컬 서버나 GitHub Pages에서 열어주세요.'));
}

/* ── 예시(데모) 결과 로드 ────────────────────────────── */
const SAMPLE_FILES = { kisa: 'samples/sample_kisa.json', cis: 'samples/sample_cis_linux.json', all: 'samples/sample_all.json' };
function loadSample(key) {
  const url = SAMPLE_FILES[key];
  if (!url) return;
  fetch(url)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(json => { data = json; baseData = null; compareMode = false; resetFilters(); render(); showToast('📋 예시 결과입니다 — 실제 점검은 main.sh로 실행하세요'); })
    .catch(() => alert('예시 결과를 불러오지 못했습니다.\n파일을 직접 열면(file://) 브라우저 보안 정책으로 차단됩니다. GitHub Pages 또는 로컬 서버에서 열어주세요.'));
}

function resetFile() {
  data = null; baseData = null; compareMode = false;
  fileInput.value = ''; heroExpanded = false; naSet = new Set();
  activeStatusFilter = 'ALL'; activeCategoryFilter = 'ALL'; activeStandardFilter = 'ALL';
  document.getElementById('dashboard').classList.remove('active');
  uploadZone.style.display = '';
  document.getElementById('sampleZone').style.display = '';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('shareLinkBtn').style.display = 'none';
  document.getElementById('compareBtn').style.display = 'none';
}

/* ── 비교 분석 모달 ──────────────────────────────────── */
const compareDropZone  = document.getElementById('compareDropZone');
const compareFileInput = document.getElementById('compareFileInput');

compareDropZone.addEventListener('click', () => compareFileInput.click());
compareDropZone.addEventListener('dragover', e => { e.preventDefault(); compareDropZone.classList.add('dragover'); });
compareDropZone.addEventListener('dragleave', () => compareDropZone.classList.remove('dragover'));
compareDropZone.addEventListener('drop', e => {
  e.preventDefault(); compareDropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadBaseFile(e.dataTransfer.files[0]);
});
compareFileInput.addEventListener('change', e => { if (e.target.files.length) loadBaseFile(e.target.files[0]); });

function openCompareModal()  { document.getElementById('compareModal').style.display = 'flex'; }
function closeCompareModal() { document.getElementById('compareModal').style.display = 'none'; }

function loadBaseFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      baseData = JSON.parse(e.target.result);
      compareMode = true;
      closeCompareModal();
      render();
      showToast('📊 비교 분석 모드 활성화됐습니다');
    } catch { alert('유효한 JSON 파일이 아닙니다.'); }
  };
  reader.readAsText(file);
}

function endCompare() {
  baseData = null; compareMode = false;
  render();
  showToast('비교 분석 모드 종료');
}

/* ── 렌더 엔트리 ───────────────────────────────────────── */
function render() {
  loadNaSet();
  uploadZone.style.display = 'none';
  document.getElementById('sampleZone').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('backBtn').style.display = '';
  document.getElementById('shareLinkBtn').style.display = '';
  document.getElementById('compareBtn').style.display = '';
  renderCompareBanner();
  renderHero();
  renderServerInfo();
  renderStats();
  renderChart();
  renderCategoryStats();
  renderFilters();
  renderChecks();
}

/* ── 비교 배너 ───────────────────────────────────────── */
function renderCompareBanner() {
  const banner = document.getElementById('compareBanner');
  if (!compareMode || !baseData) { banner.style.display = 'none'; return; }
  banner.style.display = 'flex';

  const diffMap = computeDiff();
  const worse  = Object.values(diffMap).filter(d => d === 'WORSE').length;
  const better = Object.values(diffMap).filter(d => d === 'BETTER').length;
  const same   = Object.values(diffMap).filter(d => d === 'SAME' || d === 'NEW').length;
  const base   = `${baseData.metadata?.hostname || '이전'} (${(baseData.metadata?.executionTime||'?').slice(0,10)})`;
  const cur    = `${data.metadata?.hostname || '현재'} (${(data.metadata?.executionTime||'?').slice(0,10)})`;

  banner.innerHTML = `
    <div class="label">📊 비교: ${esc(base)} → ${esc(cur)}</div>
    <div class="stats">
      <span class="compare-stat worse">⬆ 신규 취약 ${worse}개</span>
      <span class="compare-stat better">⬇ 해결됨 ${better}개</span>
      <span class="compare-stat same">↔ 유지 ${same}개</span>
    </div>
    <button class="compare-end-btn" onclick="endCompare()">✕ 비교 종료</button>`;
}

/* ── Hero: Fix-First 액션보드 ─────────────────────────── */
function renderHero() {
  const fails = data.checks.filter(c => c.status === 'FAIL' && !naSet.has(c.code));
  const score = calcScore();
  const color = scoreColor(score);
  const r     = 48;
  const circ  = 2 * Math.PI * r;
  const offset = circ * (1 - score / 100);

  let scoreDeltaHtml = '';
  if (compareMode && baseData) {
    const prev  = calcScore(baseData);
    const delta = score - prev;
    if (delta !== 0) {
      const cls  = delta > 0 ? 'up' : 'down';
      const sign = delta > 0 ? '+' : '';
      scoreDeltaHtml = `<div class="score-delta ${cls}">${sign}${delta} (이전 ${prev})</div>`;
    }
  }

  const ringHtml = `
    <div class="hero-score-col">
      <div class="score-ring">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle class="score-bg" cx="55" cy="55" r="${r}"/>
          <circle class="score-fill" cx="55" cy="55" r="${r}"
            stroke="${color}"
            stroke-dasharray="${circ.toFixed(2)}"
            stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
        <div class="score-num">
          <div class="num" style="color:${color}">${score}</div>
          <div class="denom">/100</div>
        </div>
      </div>
      <div class="score-label">위험도 점수</div>
      ${scoreDeltaHtml}
    </div>`;

  /* 전체 양호 */
  if (fails.length === 0) {
    document.getElementById('heroSection').innerHTML = `
      <div class="hero-all-pass">
        <div class="score-side">${ringHtml.replace('class="hero-score-col"','')}</div>
        <div class="msg-side">
          <div class="apass-icon">✅</div>
          <div>
            <div class="apass-msg">모든 항목 양호</div>
            <div class="apass-sub">${data.checks.length}개 항목 중 취약 항목이 없습니다.</div>
          </div>
        </div>
      </div>`;
    return;
  }

  /* 비교 모드: 신규 취약 우선 표시 */
  const diffMap = compareMode ? computeDiff() : {};
  let displayFails = fails;
  if (compareMode && baseData) {
    const newFails  = fails.filter(c => diffMap[c.code] === 'WORSE' || diffMap[c.code] === 'NEW');
    const sameFails = fails.filter(c => diffMap[c.code] === 'SAME');
    displayFails = [...newFails, ...sameFails];
  }
  const SHOW    = 6;
  const visible = heroExpanded ? displayFails : displayFails.slice(0, SHOW);

  const cards = visible.map(c => {
    const remedy = (c.reference?.remediation ?? '').trim();
    const hi     = HIGH_SEV.has(c.code);
    const diff   = diffMap[c.code];
    const safeId = 'hero-' + c.code.replace(/[^a-zA-Z0-9]/g, '-');

    const extraClass = (diff === 'WORSE' || diff === 'NEW') ? ' card-worse' : hi ? ' high-sev' : '';
    const highBadge  = hi  ? '<span class="high-badge">⚡중요</span>' : '';
    const diffBadge  = diff === 'WORSE' ? '<span class="diff-badge worse">▲신규</span>'
                     : diff === 'NEW'   ? '<span class="diff-badge new">🆕NEW</span>' : '';

    const bodyHtml = remedy
      ? `<div class="fail-card-body">
           <code id="${safeId}">${esc(remedy)}</code>
           <button class="copy-btn" onclick="copyText(event,'${safeId}',this)">📋 복사</button>
         </div>`
      : `<div class="fail-card-body"><span class="no-remedy">조치 방법 미정 — 수동 확인 필요</span></div>`;

    return `<div class="fail-card${extraClass}">
      <div class="fail-card-header">
        <span class="fail-card-code">${esc(c.code)}</span>
        ${highBadge}${diffBadge}
        <span class="fail-card-name">${esc(c.name ?? '')}</span>
      </div>
      ${bodyHtml}
    </div>`;
  }).join('');

  /* 해결된 항목 목록 (비교 모드) */
  let fixedHtml = '';
  if (compareMode && baseData) {
    const fixed = data.checks.filter(c => diffMap[c.code] === 'BETTER');
    if (fixed.length) {
      fixedHtml = `<div class="fixed-section">
        <div class="fixed-section-title">✅ 이번에 해결된 항목 (${fixed.length}개)</div>
        <div class="fixed-list">
          ${fixed.map(c => `<div class="fixed-item"><span class="fixed-code">${esc(c.code)}</span>${esc(c.name??'')}</div>`).join('')}
        </div>
      </div>`;
    }
  }

  let moreHtml = '';
  if (!heroExpanded && displayFails.length > SHOW)
    moreHtml = `<div class="hero-more"><button onclick="expandHero()">▾ 나머지 ${displayFails.length - SHOW}개 더 보기</button></div>`;
  else if (heroExpanded && displayFails.length > SHOW)
    moreHtml = `<div class="hero-more"><button onclick="collapseHero()">▴ 접기</button></div>`;

  const newCount  = Object.values(diffMap).filter(d => d === 'WORSE' || d === 'NEW').length;
  const titleLabel = (compareMode && baseData)
    ? `신규 취약 <span class="fail-count-badge">${newCount}개</span> / 전체 취약`
    : '오늘 조치해야 할 항목';

  document.getElementById('heroSection').innerHTML = `
    <div class="hero-top">
      ${ringHtml}
      <div class="hero-fails-col">
        <div class="hero-fails-title">
          ${titleLabel}
          <span class="fail-count-badge">${fails.length}개 취약</span>
        </div>
        <div class="fail-cards">${cards}</div>
      </div>
    </div>
    ${fixedHtml}
    ${moreHtml}`;
}

function expandHero()  { heroExpanded = true;  renderHero(); }
function collapseHero(){ heroExpanded = false; renderHero(); }

/* ── 서버 정보 ───────────────────────────────────────── */
function renderServerInfo() {
  const m = data.metadata;
  document.getElementById('serverInfo').innerHTML = `
    <div class="info-grid">
      <div class="info-item"><div class="label">호스트명</div>${esc(m.hostname)||'-'}</div>
      <div class="info-item"><div class="label">OS</div>${esc(m.os)||'-'}${m.distro?' ('+esc(m.distro)+')':''}</div>
      <div class="info-item"><div class="label">아키텍처</div>${esc(m.architecture)||'-'}</div>

    </div>`;
}

/* ── 통계 카드 ──────────────────────────────────────── */
function renderStats() {
  const s = data.summary;
  const naCount       = data.checks.filter(c => naSet.has(c.code)).length;
  const effFail       = data.checks.filter(c => c.status === 'FAIL'   && !naSet.has(c.code)).length;
  const effReview     = data.checks.filter(c => c.status === 'REVIEW' && !naSet.has(c.code)).length;
  const effPass       = data.checks.filter(c => c.status === 'PASS'   && !naSet.has(c.code)).length;

  let dFail = '', dReview = '', dPass = '';
  if (compareMode && baseData) {
    const b = baseData.summary;
    const fmt = (n, redIfPositive) => {
      if (!n) return '';
      const cls = (redIfPositive ? n > 0 : n < 0) ? 'fail' : 'pass';
      return `<div class="delta" style="color:var(--${cls})">${n>0?'+':''}${n}</div>`;
    };
    dFail   = fmt(s.fail   - b.fail,   true);
    dReview = fmt(s.review - b.review, true);
    dPass   = fmt(s.pass   - b.pass,   false);
  }

  const naCard = naCount > 0
    ? `<div class="stat-card"><div class="number" style="color:#9ca3af">${naCount}</div><div class="label">해당없음</div></div>`
    : '';

  const row = document.getElementById('statsRow');
  row.style.gridTemplateColumns = naCount > 0 ? 'repeat(auto-fit,minmax(130px,1fr))' : '';
  row.innerHTML = `
    <div class="stat-card"><div class="number">${s.total}</div><div class="label">전체 항목</div></div>
    <div class="stat-card pass"><div class="number">${effPass}</div><div class="label">양호</div>${dPass}</div>
    <div class="stat-card fail"><div class="number">${effFail}</div><div class="label">취약</div>${dFail}</div>
    <div class="stat-card review"><div class="number">${effReview}</div><div class="label">확인필요</div>${dReview}</div>
    ${naCard}`;
}

/* ── 도넛 차트 ──────────────────────────────────────── */
function renderChart() {
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
  const naCount   = data.checks.filter(c => naSet.has(c.code)).length;
  const effPass   = data.checks.filter(c => c.status === 'PASS'   && !naSet.has(c.code)).length;
  const effFail   = data.checks.filter(c => c.status === 'FAIL'   && !naSet.has(c.code)).length;
  const effReview = data.checks.filter(c => c.status === 'REVIEW' && !naSet.has(c.code)).length;
  const labels = naCount > 0 ? ['양호','취약','확인필요','해당없음'] : ['양호','취약','확인필요'];
  const chartData = naCount > 0 ? [effPass, effFail, effReview, naCount] : [effPass, effFail, effReview];
  const colors    = naCount > 0 ? ['#10b981','#ef4444','#f59e0b','#9ca3af'] : ['#10b981','#ef4444','#f59e0b'];
  chartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: chartData, backgroundColor: colors, borderWidth: 0 }] },
    options: { responsive: true,
      plugins: { legend: { position:'bottom', labels:{ color:textColor, padding:16 } } },
      cutout: '60%' }
  });
}

/* ── 카테고리 현황 (JSON에서 동적 추출) ─────────────── */
function renderCategoryStats() {
  const cats = getDerivedCategories(data);
  let html = '<h3 style="margin-bottom:12px;font-size:15px;">카테고리별 현황</h3>';
  cats.forEach(cat => {
    const items  = data.checks.filter(c => c.category === cat);
    const pass   = items.filter(c => c.status === 'PASS').length;
    const fail   = items.filter(c => c.status === 'FAIL').length;
    const review = items.filter(c => c.status === 'REVIEW').length;
    const total  = items.length;
    const pct    = total ? Math.round(pass / total * 100) : 0;
    html += `<div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
        <span>${esc(cat)}</span><span>${pass}/${total} (${pct}%)</span>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;display:flex;">
        <div style="width:${total?pass/total*100:0}%;background:var(--pass);"></div>
        <div style="width:${total?fail/total*100:0}%;background:var(--fail);"></div>
        <div style="width:${total?review/total*100:0}%;background:var(--review);"></div>
      </div>
    </div>`;
  });
  document.getElementById('categoryStats').innerHTML = html;
}

/* ── 필터 (카테고리 동적) ──────────────────────────── */
function renderFilters() {
  const cats = getDerivedCategories(data);
  const naCount = data.checks.filter(c => naSet.has(c.code)).length;
  if (activeStatusFilter === 'NA' && naCount === 0) activeStatusFilter = 'ALL';
  const sf = [
    {key:'ALL',label:'전체'},
    {key:'PASS',label:'양호'},
    {key:'FAIL',label:'취약'},
    {key:'REVIEW',label:'확인필요'},
    ...(naCount > 0 ? [{key:'NA',label:`해당없음 ${naCount}`}] : []),
  ];

  let html = '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;"><div class="filter-group">';
  sf.forEach(f => {
    html += `<button class="filter-btn${activeStatusFilter===f.key?' active':''}" onclick="setStatusFilter('${f.key}')">${f.label}</button>`;
  });
  html += '</div>';
  // 점검 기준 필터 (통합 JSON에서 2개 이상 기준이 있을 때만)
  const stds = getDerivedStandards(data);
  if (stds.length > 1) {
    html += '<div style="width:1px;height:28px;background:var(--border);margin:0 8px;align-self:center;"></div><div class="filter-group">';
    html += `<button class="filter-btn${activeStandardFilter==='ALL'?' active':''}" onclick="setStandardFilter('ALL')">전체 기준</button>`;
    stds.forEach(st => {
      html += `<button class="filter-btn${activeStandardFilter===st?' active':''}" data-std="${esc(st)}" onclick="setStandardFilter(this.dataset.std)">${esc(st)}</button>`;
    });
    html += '</div>';
  }
  if (cats.length > 1) {
    html += '<div style="width:1px;height:28px;background:var(--border);margin:0 8px;align-self:center;"></div><div class="filter-group">';
    html += `<button class="filter-btn${activeCategoryFilter==='ALL'?' active':''}" onclick="setCategoryFilter('ALL')">전체 카테고리</button>`;
    cats.forEach(cat => {
      html += `<button class="filter-btn${activeCategoryFilter===cat?' active':''}" data-cat="${esc(cat)}" onclick="setCategoryFilter(this.dataset.cat)">${esc(cat)}</button>`;
    });
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('filters').innerHTML = html;
}

function setStatusFilter(key)   { activeStatusFilter = key;   renderFilters(); renderChecks(); }
function setCategoryFilter(key) { activeCategoryFilter = key; renderFilters(); renderChecks(); }
function setStandardFilter(key) { activeStandardFilter = key; renderFilters(); renderChecks(); }

function getFilteredChecks() {
  const q = (document.getElementById('searchInput')?.value ?? '').trim().toLowerCase();
  return data.checks.filter(c => {
    const isNA = naSet.has(c.code);
    if (activeStatusFilter === 'NA') {
      if (!isNA) return false;
    } else if (activeStatusFilter !== 'ALL') {
      if (c.status !== activeStatusFilter || isNA) return false;
    }
    if (activeStandardFilter !== 'ALL' && c.standard !== activeStandardFilter) return false;
    if (activeCategoryFilter !== 'ALL' && c.category !== activeCategoryFilter) return false;
    if (q && !((c.code ?? '').toLowerCase().includes(q) || (c.name ?? '').toLowerCase().includes(q))) return false;
    return true;
  });
}

/* ── 항목 목록 ──────────────────────────────────────── */
function renderChecks() {
  const filtered = getFilteredChecks();
  document.getElementById('countBadge').textContent = `${filtered.length}개 항목`;

  if (!filtered.length) {
    document.getElementById('checksList').innerHTML =
      '<div style="padding:40px;text-align:center;color:var(--text-secondary);">해당하는 항목이 없습니다.</div>';
    return;
  }

  const diffMap = compareMode ? computeDiff() : {};
  let html = '';

  filtered.forEach(c => {
    const ref    = c.reference ?? {};
    const remedy = (ref.remediation ?? '').trim();
    const listId = 'list-' + c.code.replace(/[^a-zA-Z0-9]/g, '-');
    const diff   = diffMap[c.code];
    const hi     = HIGH_SEV.has(c.code);

    const isNA = naSet.has(c.code);
    let rowClass = 'check-item';
    if (isNA) rowClass += ' na-item';
    else if (diff === 'WORSE' || diff === 'NEW') rowClass += ' diff-worse';
    else if (diff === 'BETTER') rowClass += ' diff-better';

    let diffBadge = '';
    if (diff === 'WORSE')  diffBadge = '<span class="inline-diff-badge worse">▲ 신규 취약</span>';
    else if (diff === 'NEW')    diffBadge = '<span class="inline-diff-badge new">🆕 NEW</span>';
    else if (diff === 'BETTER') diffBadge = '<span class="inline-diff-badge better">▼ 해결됨</span>';

    const remedyBlock = c.status === 'FAIL'
      ? `<div class="detail-remedy">
           <h4>🔧 조치 방법${hi ? ' ⚡중요' : ''}</h4>
           ${remedy
             ? `<div class="remedy-row">
                  <code id="${listId}">${esc(remedy)}</code>
                  <button class="copy-btn" onclick="copyText(event,'${listId}',this)" style="margin-top:2px">📋 복사</button>
                </div>`
             : '<span style="font-size:12px;color:var(--text-secondary)">조치 방법 미정 — 수동 확인 필요</span>'}
         </div>`
      : '';

    let compareBlock = '';
    if (compareMode && diff && diff !== 'SAME') {
      const prev       = baseData?.checks.find(b => b.code === c.code);
      const prevStatus = prev ? (statusLabels[prev.status] || prev.status) : '미점검';
      const prevDetail = prev?.detail ? ` — ${esc(prev.detail)}` : '';
      compareBlock = `<div class="detail-compare">
        <h4>📊 이전 결과</h4>
        <p>${prevStatus}${prevDetail}</p>
      </div>`;
    }

    const statusBadge = isNA
      ? '<span class="status-badge NA">해당없음</span>'
      : `<span class="status-badge ${c.status}">${statusLabels[c.status] ?? c.status}</span>`;
    const naBtnLabel = isNA ? '✕ 해당없음 해제' : '해당없음';
    const naBtn = `<button class="na-btn${isNA?' is-na':''}" data-code="${esc(c.code)}" onclick="toggleNA(event,this.dataset.code)" title="이 항목을 해당없음으로 마킹/해제">${naBtnLabel}</button>`;

    html += `<div class="${rowClass}" onclick="this.classList.toggle('open')">
      <div class="check-header">
        ${c.standard ? `<span class="check-standard-tag">${esc(c.standard)}</span>` : ''}
        <span class="check-code">${esc(c.code)}</span>
        <span class="check-name">${esc(c.name ?? '')}</span>
        <span class="check-category-tag">${esc(c.category ?? '')}</span>
        ${isNA ? '' : diffBadge}
        ${statusBadge}
        ${naBtn}
        <span class="chevron">▶</span>
      </div>
      <div class="check-detail">
        <div class="detail-grid">
          <div class="detail-block"><h4>점검 목적</h4><p>${esc(ref.purpose||'-')}</p></div>
          <div class="detail-block"><h4>점검 내용</h4><p>${esc(ref.check||'-')}</p></div>
          <div class="detail-block"><h4>양호 기준</h4><p>${esc(ref.goodCriteria||'-')}</p></div>
          <div class="detail-block"><h4>취약 기준</h4><p>${esc(ref.badCriteria||'-')}</p></div>
          <div class="detail-block"><h4>보안 위협</h4><p>${esc(ref.threat||'-')}</p></div>
          ${c.status !== 'FAIL' ? `<div class="detail-block"><h4>조치 방법</h4><p>${esc(ref.remediation||'-')}</p></div>` : ''}
          ${remedyBlock}
          ${compareBlock}
          <div class="detail-result">
            <h4>점검 결과</h4>
            <p>${isNA ? '<span class="status-badge NA">해당없음 (로컬 마킹)</span>' : `<span class="status-badge ${c.status}">${statusLabels[c.status]}</span>`} ${esc(c.detail ?? '')}</p>
          </div>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('checksList').innerHTML = html;
}

/* ── 링크 공유 (gzip + base64 URL 해시) ─────────────── */
function generateShareLink() {
  if (!data) return;
  try {
    const compressed = pako.gzip(JSON.stringify(data));
    let b64 = '';
    for (let i = 0; i < compressed.length; i += 8192)
      b64 += String.fromCharCode(...compressed.subarray(i, i + 8192));
    b64 = btoa(b64);

    if (b64.length > 64000) {
      showToast('⚠ JSON이 너무 커서 URL 공유 불가 (64KB 초과)');
      return;
    }
    const url = location.origin + location.pathname + '#data=' + b64;
    navigator.clipboard.writeText(url)
      .then(() => showToast('🔗 링크가 클립보드에 복사됐습니다'))
      .catch(() => showToast('복사 실패 — 주소창에서 직접 복사해 주세요'));
  } catch (e) {
    showToast('링크 생성 실패: ' + e.message);
  }
}

/* ── URL 해시 자동 로드 ─────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  if (location.hash.startsWith('#data=')) {
    try {
      const binary = atob(location.hash.slice(6));
      const bytes  = Uint8Array.from(binary, ch => ch.charCodeAt(0));
      data = JSON.parse(pako.ungzip(bytes, { to: 'string' }));
      render();
    } catch (e) {
      alert('링크 데이터가 손상됐습니다: ' + e.message);
    }
  }
});
