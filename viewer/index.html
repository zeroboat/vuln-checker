<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>취약점 점검 결과 뷰어</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>
<style>
:root {
  --bg: #f5f7fa; --surface: #ffffff; --text: #1a1a2e; --text-secondary: #6b7280;
  --border: #e5e7eb; --pass: #10b981; --fail: #ef4444; --review: #f59e0b;
  --pass-bg: #ecfdf5; --fail-bg: #fef2f2; --review-bg: #fffbeb;
  --primary: #3b82f6; --primary-hover: #2563eb; --shadow: rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0; --text-secondary: #94a3b8;
  --border: #334155; --pass-bg: #064e3b; --fail-bg: #450a0a; --review-bg: #451a03;
  --shadow: rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: background .3s, color .3s; min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 1.5rem; }
.theme-toggle { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; cursor: pointer; color: var(--text); font-size: 14px; }

/* Upload */
.upload-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 60px 20px; text-align: center; background: var(--surface); cursor: pointer; transition: border-color .2s; margin-bottom: 24px; }
.upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); }
.upload-zone h2 { margin-bottom: 8px; font-size: 1.2rem; }
.upload-zone p { color: var(--text-secondary); font-size: 14px; }
.upload-zone input { display: none; }

/* Dashboard */
.dashboard { display: none; }
.dashboard.active { display: block; }

/* Info card */
.info-card { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 1px 3px var(--shadow); }
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.info-item { font-size: 14px; }
.info-item .label { color: var(--text-secondary); font-size: 12px; margin-bottom: 2px; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid var(--border); box-shadow: 0 1px 3px var(--shadow); }
.stat-card .number { font-size: 2rem; font-weight: 700; }
.stat-card .label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.stat-card.pass .number { color: var(--pass); }
.stat-card.fail .number { color: var(--fail); }
.stat-card.review .number { color: var(--review); }

/* Chart */
.chart-section { display: grid; grid-template-columns: 300px 1fr; gap: 20px; margin-bottom: 20px; }
.chart-box { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
.chart-box canvas { max-width: 250px; max-height: 250px; }

/* Filters */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; transition: all .2s; }
.filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-sep { width: 1px; height: 28px; background: var(--border); margin: 0 8px; align-self: center; }

/* Check list */
.checks-list { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.check-item { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
.check-item:last-child { border-bottom: none; }
.check-item:hover { background: var(--bg); }
.check-header { display: flex; align-items: center; padding: 14px 20px; gap: 12px; }
.check-code { font-weight: 600; font-size: 14px; min-width: 50px; }
.check-name { flex: 1; font-size: 14px; }
.check-category-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg); color: var(--text-secondary); white-space: nowrap; }
.status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.status-badge.PASS { background: var(--pass-bg); color: var(--pass); }
.status-badge.FAIL { background: var(--fail-bg); color: var(--fail); }
.status-badge.REVIEW { background: var(--review-bg); color: var(--review); }
.chevron { font-size: 12px; color: var(--text-secondary); transition: transform .2s; }
.check-item.open .chevron { transform: rotate(90deg); }
.check-detail { display: none; padding: 0 20px 16px 20px; }
.check-item.open .check-detail { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.detail-block { background: var(--bg); border-radius: 8px; padding: 12px; }
.detail-block h4 { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.detail-block p { font-size: 13px; line-height: 1.5; }
.detail-result { grid-column: 1 / -1; background: var(--bg); border-radius: 8px; padding: 12px; }

/* PDF button */
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.btn-pdf { padding: 8px 20px; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 14px; }
.btn-pdf:hover { background: var(--primary-hover); }
.btn-reset { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; }

/* Count badge */
.count-badge { font-size: 12px; color: var(--text-secondary); }

@media (max-width: 768px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .chart-section { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
  .filter-sep { display: none; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🛡️ 취약점 점검 결과</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 다크모드</button>
  </div>

  <div class="upload-zone" id="uploadZone">
    <h2>JSON 결과 파일 업로드</h2>
    <p>파일을 드래그하거나 클릭하여 선택하세요</p>
    <input type="file" id="fileInput" accept=".json">
  </div>

  <div class="dashboard" id="dashboard">
    <div class="info-card" id="serverInfo"></div>

    <div class="stats-row" id="statsRow"></div>

    <div class="chart-section">
      <div class="chart-box"><canvas id="chart"></canvas></div>
      <div class="info-card" id="categoryStats"></div>
    </div>

    <div class="toolbar">
      <div class="filters" id="filters"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn-reset" onclick="resetFile()">다른 파일 열기</button>
        <button class="btn-pdf" onclick="exportPDF()">📄 PDF 내보내기</button>
      </div>
    </div>

    <div id="reportContent">
      <div class="count-badge" id="countBadge"></div>
      <div class="checks-list" id="checksList"></div>
    </div>
  </div>
</div>

<script>
let data = null;
let chartInstance = null;
let activeStatusFilter = 'ALL';
let activeCategoryFilter = 'ALL';

const statusLabels = { PASS: '양호', FAIL: '취약', REVIEW: '확인필요' };
const categories = ['계정 관리', '파일 및 디렉토리 관리', '서비스 관리', '로그 및 감시'];

// Theme
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  document.querySelector('.theme-toggle').textContent = isDark ? '🌙 다크모드' : '☀️ 라이트모드';
  if (chartInstance) renderChart();
}

// Upload
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) loadFile(e.target.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      data = JSON.parse(e.target.result);
      render();
    } catch (err) {
      alert('유효한 JSON 파일이 아닙니다.');
    }
  };
  reader.readAsText(file);
}

function resetFile() {
  data = null;
  fileInput.value = '';
  document.getElementById('dashboard').classList.remove('active');
  uploadZone.style.display = '';
}

function render() {
  uploadZone.style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  renderServerInfo();
  renderStats();
  renderChart();
  renderCategoryStats();
  renderFilters();
  renderChecks();
}

function renderServerInfo() {
  const m = data.metadata;
  document.getElementById('serverInfo').innerHTML = `
    <div class="info-grid">
      <div class="info-item"><div class="label">호스트명</div>${m.hostname || '-'}</div>
      <div class="info-item"><div class="label">OS</div>${m.os || '-'}${m.distro ? ' (' + m.distro + ')' : ''}</div>
      <div class="info-item"><div class="label">아키텍처</div>${m.architecture || '-'}</div>
      <div class="info-item"><div class="label">점검 일시</div>${m.executionTime || '-'}</div>
    </div>`;
}

function renderStats() {
  const s = data.summary;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="number">${s.total}</div><div class="label">전체 항목</div></div>
    <div class="stat-card pass"><div class="number">${s.pass}</div><div class="label">양호</div></div>
    <div class="stat-card fail"><div class="number">${s.fail}</div><div class="label">취약</div></div>
    <div class="stat-card review"><div class="number">${s.review}</div><div class="label">확인필요</div></div>`;
}

function renderChart() {
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
  chartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['양호', '취약', '확인필요'],
      datasets: [{
        data: [data.summary.pass, data.summary.fail, data.summary.review],
        backgroundColor: ['#10b981', '#ef4444', '#f59e0b'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { color: textColor, padding: 16 } }
      },
      cutout: '60%'
    }
  });
}

function renderCategoryStats() {
  let html = '<h3 style="margin-bottom:12px;font-size:15px;">카테고리별 현황</h3>';
  categories.forEach(cat => {
    const items = data.checks.filter(c => c.category === cat);
    const pass = items.filter(c => c.status === 'PASS').length;
    const fail = items.filter(c => c.status === 'FAIL').length;
    const review = items.filter(c => c.status === 'REVIEW').length;
    const total = items.length;
    const pct = total > 0 ? Math.round(pass / total * 100) : 0;
    html += `<div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
        <span>${cat}</span><span>${pass}/${total} (${pct}%)</span>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;display:flex;">
        <div style="width:${total?pass/total*100:0}%;background:var(--pass);"></div>
        <div style="width:${total?fail/total*100:0}%;background:var(--fail);"></div>
        <div style="width:${total?review/total*100:0}%;background:var(--review);"></div>
      </div>
    </div>`;
  });
  document.getElementById('categoryStats').innerHTML = html;
}

function renderFilters() {
  const statusFilters = [
    { key: 'ALL', label: '전체' },
    { key: 'PASS', label: '양호' },
    { key: 'FAIL', label: '취약' },
    { key: 'REVIEW', label: '확인필요' }
  ];
  const catFilters = [{ key: 'ALL', label: '전체 카테고리' }, ...categories.map(c => ({ key: c, label: c }))];

  let html = '<div class="filter-group">';
  statusFilters.forEach(f => {
    html += `<button class="filter-btn${activeStatusFilter===f.key?' active':''}" onclick="setStatusFilter('${f.key}')">${f.label}</button>`;
  });
  html += '</div><div class="filter-sep"></div><div class="filter-group">';
  catFilters.forEach(f => {
    html += `<button class="filter-btn${activeCategoryFilter===f.key?' active':''}" onclick="setCategoryFilter('${f.key}')">${f.label}</button>`;
  });
  html += '</div>';
  document.getElementById('filters').innerHTML = html;
}

function setStatusFilter(key) { activeStatusFilter = key; renderFilters(); renderChecks(); }
function setCategoryFilter(key) { activeCategoryFilter = key; renderFilters(); renderChecks(); }

function getFilteredChecks() {
  return data.checks.filter(c => {
    if (activeStatusFilter !== 'ALL' && c.status !== activeStatusFilter) return false;
    if (activeCategoryFilter !== 'ALL' && c.category !== activeCategoryFilter) return false;
    return true;
  });
}

function renderChecks() {
  const filtered = getFilteredChecks();
  document.getElementById('countBadge').textContent = `${filtered.length}개 항목`;

  let html = '';
  filtered.forEach((c, i) => {
    const ref = c.reference || {};
    html += `<div class="check-item" onclick="this.classList.toggle('open')">
      <div class="check-header">
        <span class="check-code">${c.code}</span>
        <span class="check-name">${c.name || ''}</span>
        <span class="check-category-tag">${c.category || ''}</span>
        <span class="status-badge ${c.status}">${statusLabels[c.status] || c.status}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="check-detail">
        <div class="detail-grid">
          <div class="detail-block"><h4>점검 목적</h4><p>${ref.purpose || '-'}</p></div>
          <div class="detail-block"><h4>점검 내용</h4><p>${ref.check || '-'}</p></div>
          <div class="detail-block"><h4>양호 기준</h4><p>${ref.goodCriteria || '-'}</p></div>
          <div class="detail-block"><h4>취약 기준</h4><p>${ref.badCriteria || '-'}</p></div>
          <div class="detail-block"><h4>보안 위협</h4><p>${ref.threat || '-'}</p></div>
          <div class="detail-block"><h4>조치 방법</h4><p>${ref.remediation || '-'}</p></div>
          <div class="detail-result"><h4>점검 결과</h4><p><span class="status-badge ${c.status}">${statusLabels[c.status]}</span> ${c.detail || ''}</p></div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('checksList').innerHTML = html || '<div style="padding:40px;text-align:center;color:var(--text-secondary);">해당하는 항목이 없습니다.</div>';
}

function exportPDF() {
  const el = document.getElementById('reportContent');
  const opt = {
    margin: [10, 10],
    filename: `vuln-report-${data.metadata.hostname || 'unknown'}.pdf`,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };
  html2pdf().set(opt).from(el).save();
}
</script>
</body>
</html>
